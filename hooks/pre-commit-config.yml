# Add this to your .pre-commit-config.yaml to enable nv-context continuous sync
# Warns when code changes may make agent configs stale

repos:
  - repo: local
    hooks:
      - id: nv-context-sync
        name: nv-context Sync Check
        entry: .git/hooks/nv-context-sync.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-commit]
        verbose: true
